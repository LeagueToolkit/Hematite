# git-cliff configuration for Hematite

[changelog]
# Header shown at the top of the changelog
header = """
# Changelog\n
All notable changes to Hematite will be documented in this file.\n
"""
# Template for the changelog body
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | upper_first }}
    {% for commit in commits %}
        - {{ commit.message | upper_first }}\
    {% endfor %}
{% endfor %}\n
"""
# Footer shown at the end of the changelog
footer = """
<!-- generated by git-cliff -->
"""
# Remove the leading and trailing whitespace from the template
trim = true

[git]
# Parse the commits based on https://www.conventionalcommits.org
conventional_commits = true
# Filter out unconventional commits (commits that don't follow conventional format)
filter_unconventional = true
# Process each line of a commit as an individual commit (for squashed commits)
split_commits = false
# Regex for preprocessing the commit messages
commit_preprocessors = [
    { pattern = '\((\w+\s)?#([0-9]+)\)', replace = "([#${2}](https://github.com/RitoShark/Skin-Fixer/issues/${2}))" },
]
# Regex for parsing and grouping commits
commit_parsers = [
    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Bug Fixes" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Refactor" },
    { message = "^doc", group = "Documentation" },
    { message = "^revert", group = "Reverts" },
    { message = "^style", group = "Styling" },
    { message = "^test", group = "Testing" },
    # Skip chore, ci, and build commits (they won't appear in changelog)
    { message = "^chore", skip = true },
    { message = "^ci", skip = true },
    { message = "^build", skip = true },
]
# Protect breaking changes from being skipped due to matching a skipping pattern
protect_breaking_commits = false
# Filter out commits that are not matched by commit parsers
filter_commits = false
# Regex for matching git tags
tag_pattern = "v[0-9].*"
# Sort the tags chronologically
date_order = false
# Sort the commits inside sections by oldest/newest order
sort_commits = "oldest"
