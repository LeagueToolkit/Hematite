name: CI

on:
  push:
    branches: [main, v2]
  pull_request:
    branches: [main, v2]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: hematite-v2

      - name: Check formatting
        working-directory: hematite-v2
        run: cargo fmt --all -- --check

      - name: Clippy
        working-directory: hematite-v2
        run: cargo clippy --workspace -- -D warnings -A clippy::needless_return

      - name: Tests
        working-directory: hematite-v2
        run: cargo test --workspace
